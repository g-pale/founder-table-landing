<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Founder Table — закрытая встреча</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
</head>
<body class="min-h-screen bg-gray-900 text-gray-100 font-sans antialiased selection:bg-blue-500/30">
  <!-- Ссылка на бота: константа TELEGRAM_APPLY_LINK в <script> внизу страницы -->
  <div class="relative overflow-hidden">
    <div class="pointer-events-none absolute inset-0 bg-[radial-gradient(ellipse_80%_50%_at_50%_-20%,rgba(37,99,235,0.15),transparent)]"></div>
    <div class="pointer-events-none absolute bottom-0 left-1/2 h-px w-[min(100%,42rem)] -translate-x-1/2 bg-gradient-to-r from-transparent via-gray-700 to-transparent"></div>

    <main class="relative mx-auto flex min-h-screen max-w-2xl flex-col justify-center px-6 py-20 sm:px-8">
      <p class="mb-4 text-xs font-medium uppercase tracking-[0.2em] text-gray-500">
        Приглашение
      </p>
      <h1 class="text-3xl font-semibold tracking-tight text-white sm:text-4xl md:text-[2.5rem] md:leading-tight">
        Закрытая встреча: Founder Table
      </h1>
      <p class="mt-6 max-w-xl text-lg leading-relaxed text-gray-400">
        Только плотный смысл. Без воды. Разбираем реальные кейсы.
      </p>

      <section
        class="mt-12 rounded-xl border border-gray-800/80 bg-gray-950/50 px-6 py-8 backdrop-blur-sm"
        aria-label="Параметры встречи"
      >
        <dl class="space-y-5 text-sm sm:text-base">
          <div class="flex flex-col gap-1 sm:flex-row sm:items-baseline sm:justify-between sm:gap-8">
            <dt class="shrink-0 font-medium uppercase tracking-wider text-gray-500">Тема</dt>
            <dd class="text-right text-gray-100 sm:text-left">
              <span id="event-topic">Загрузка...</span>
            </dd>
          </div>
          <div class="h-px bg-gray-800/80"></div>
          <div class="flex flex-col gap-1 sm:flex-row sm:items-baseline sm:justify-between sm:gap-8">
            <dt class="shrink-0 font-medium uppercase tracking-wider text-gray-500">Дата</dt>
            <dd class="text-right text-gray-100 sm:text-left">
              <span id="event-date">Загрузка...</span>
            </dd>
          </div>
          <div class="h-px bg-gray-800/80"></div>
          <div class="flex flex-col gap-1 sm:flex-row sm:items-baseline sm:justify-between sm:gap-8">
            <dt class="shrink-0 font-medium uppercase tracking-wider text-gray-500">Время</dt>
            <dd class="text-right text-gray-100 sm:text-left">
              <span id="event-time">Загрузка...</span>
            </dd>
          </div>
        </dl>
      </section>

      <div class="mt-12">
        <a
          id="cta-apply"
          href="#"
          class="inline-flex w-full items-center justify-center rounded-lg bg-blue-600 px-8 py-4 text-center text-base font-semibold text-white shadow-lg shadow-blue-900/20 transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-gray-900 sm:w-auto sm:min-w-[20rem]"
        >
          Подать заявку на закрытую встречу
        </a>
      </div>

      <p class="mt-10 text-center text-xs text-gray-600">
        Доступ по заявке и модерации
      </p>
    </main>
  </div>

  <script>
    /** Ссылка на старт бота (username без @) */
    const TELEGRAM_APPLY_LINK = "https://t.me/mvpmeetup_bot?start=1";

    /**
     * Публичная ссылка на CSV листа «Настройки» (Файл → Опубликовать в интернете → CSV).
     * Вставьте сюда URL экспорта; строка 1 — заголовки, строка 2 — Тема, Дата, Время (A2–C2).
     */
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT2DyUxnxoBrLS_kc-CYDEYmp7aaDC4u-86y0oqc19vnaFl4fac_zQJirnAtc2fanlElKM9Pj7y_57e/pub?gid=143026579&single=true&output=csv";

    (function () {
      const cta = document.getElementById("cta-apply");
      if (cta) cta.href = TELEGRAM_APPLY_LINK;

      const elTopic = document.getElementById("event-topic");
      const elDate = document.getElementById("event-date");
      const elTime = document.getElementById("event-time");

      function setFallback() {
        const t = "Уточняется";
        if (elTopic) elTopic.textContent = t;
        if (elDate) elDate.textContent = t;
        if (elTime) elTime.textContent = t;
      }

      /** Разбор одной строки CSV с учётом кавычек */
      function parseCSVLine(line) {
        const out = [];
        let cur = "";
        let inQ = false;
        for (let i = 0; i < line.length; i++) {
          const c = line[i];
          if (c === '"') {
            if (inQ && line[i + 1] === '"') {
              cur += '"';
              i++;
            } else {
              inQ = !inQ;
            }
          } else if ((c === "," && !inQ) || (c === "\r" && !inQ)) {
            out.push(cur.trim());
            cur = "";
          } else {
            cur += c;
          }
        }
        out.push(cur.trim());
        return out;
      }

      async function loadEventInfo() {
        if (!SHEET_CSV_URL.trim() || SHEET_CSV_URL === "СЮДА_ВСТАВИТЬ_ССЫЛКУ") {
          setFallback();
          return;
        }
        try {
          const res = await fetch(SHEET_CSV_URL, { cache: "no-store" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const text = await res.text();
          const lines = text.split(/\r?\n/).filter(function (l) {
            return l.length > 0;
          });
          if (lines.length < 2) throw new Error("Недостаточно строк в CSV");
          const dataRow = parseCSVLine(lines[1]);
          const topic = dataRow[0] || "";
          const date = dataRow[1] || "";
          const time = dataRow[2] || "";
          if (elTopic) elTopic.textContent = topic || "Уточняется";
          if (elDate) elDate.textContent = date || "Уточняется";
          if (elTime) elTime.textContent = time || "Уточняется";
        } catch (e) {
          console.warn("Event info fetch failed:", e);
          setFallback();
        }
      }

      loadEventInfo();
    })();
  </script>
</body>
</html>
